<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cardápio Pizza</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#110706;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:40px 15px;
    }

    .container{
      width:100%;
      max-width:420px;
    }

    .title{
      font-size:48px;
      font-weight:800;
      margin-bottom:30px;
      letter-spacing:-2px;
    }

    .pizza-card{
      width:100%;
      background:#260000;
      border:1px solid rgba(255,255,255,0.05);
      border-radius:28px;
      padding:14px;
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:18px;
      transition:0.3s;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.02),
        0 10px 30px rgba(0,0,0,0.4);
    }

    .pizza-card:hover{
      transform:translateY(-3px);
    }

    .pizza-image{
      width:125px;
      height:125px;
      border-radius:22px;
      object-fit:cover;
    }

    .pizza-content{
      flex:1;
    }

    .pizza-name{
      font-size:32px;
      font-weight:800;
      margin-bottom:8px;
    }

    .pizza-description{
      color:#b8a9a9;
      font-size:12px;
      line-height:1.5;
      margin-bottom:18px;
    }

    .pizza-size{
      color:#d0c1c1;
      font-size:10px;
      font-weight:bold;
      margin-bottom:3px;
    }

    .pizza-price{
      color:#f3b321;
      font-size:30px;
      font-weight:800;
    }

    .add-btn{
      width:58px;
      height:58px;
      min-width:58px;
      border:none;
      border-radius:50%;
      background:#f3b321;
      color:#3d1200;
      font-size:34px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    .add-btn:hover{
      transform:scale(1.08);
    }

    .cart{
      position:fixed;
      bottom:25px;
      right:25px;
      background:#f3b321;
      color:#000;
      padding:18px 24px;
      border-radius:20px;
      font-weight:bold;
      font-size:18px;
      cursor:pointer;
      border:none;
      box-shadow:0 10px 30px rgba(0,0,0,0.4);
      transition:0.3s;
    }

    .cart:hover{
      transform:scale(1.05);
    }

    @media(max-width:500px){

      .title{
        font-size:34px;
      }

      .pizza-name{
        font-size:22px;
      }

      .pizza-price{
        font-size:24px;
      }

      .pizza-image{
        width:95px;
        height:95px;
      }

      .pizza-card{
        border-radius:22px;
      }
    }

  </style>
</head>
<body>

  <div class="container">

    <h1 class="title">Pizza Grande</h1>

    <!-- Pizza 1 -->
    <div class="pizza-card">

      <img
        class="pizza-image"
        src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?q=80&w=800"
      />

      <div class="pizza-content">

        <div class="pizza-name">Frango</div>

        <div class="pizza-description">
          (Molho, Muçarela, Frango, Ervilha, Milho e Azeitona)
        </div>

        <div class="pizza-size">GRANDE</div>

        <div class="pizza-price">R$ 52,90</div>

      </div>

      <button
        class="add-btn"
        onclick="addToCart('Pizza Frango Grande', 52.90)"
      >
        +
      </button>

    </div>

    <!-- Pizza 2 -->
    <div class="pizza-card">

      <img
        class="pizza-image"
        src="https://images.unsplash.com/photo-1513104890138-7c749659a591?q=80&w=800"
      />

      <div class="pizza-content">

        <div class="pizza-name">Calabresa</div>

        <div class="pizza-description">
          (Molho, Muçarela, Calabresa e Cebola)
        </div>

        <div class="pizza-size">GRANDE</div>

        <div class="pizza-price">R$ 52,90</div>

      </div>

      <button
        class="add-btn"
        onclick="addToCart('Pizza Calabresa Grande', 52.90)"
      >
        +
      </button>

    </div>

    <!-- Pizza 3 -->
    <div class="pizza-card">

      <img
        class="pizza-image"
        src="https://images.unsplash.com/photo-1604382355076-af4b0eb60143?q=80&w=800"
      />

      <div class="pizza-content">

        <div class="pizza-name">Mussarela</div>

        <div class="pizza-description">
          (Molho, Muçarela, Tomate e Orégano)
        </div>

        <div class="pizza-size">GRANDE</div>

        <div class="pizza-price">R$ 52,90</div>

      </div>

      <button
        class="add-btn"
        onclick="addToCart('Pizza Mussarela Grande', 52.90)"
      >
        +
      </button>

    </div>

  </div>

  <button class="cart" onclick="sendWhatsApp()">
    Fazer Pedido 🛒
  </button>

  <script>

    let cart = [];

    function addToCart(name, price){

      cart.push({
        name,
        price
      });

      alert(name + " adicionada ao pedido!");
    }

    function sendWhatsApp(){

      if(cart.length === 0){
        alert("Adicione pelo menos uma pizza!");
        return;
      }

      let message = "🍕 *NOVO PEDIDO* %0A%0A";

      let total = 0;

      cart.forEach((item, index) => {

        message += `*${index + 1}.* ${item.name} - R$ ${item.price.toFixed(2)}%0A`;

        total += item.price;
      });

      message += `%0A💰 *Total:* R$ ${total.toFixed(2)}`;

      /*
        TROQUE O NÚMERO ABAIXO PELO WHATSAPP DA PIZZARIA
        Exemplo:
        5585999999999
      */

      const phone = "5585991681265";

      const url =
        `https://wa.me/${phone}?text=${message}`;

      window.open(url, "_blank");
    }

  </script>

</body>
</html>
